<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞牛电视直播</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">📺</span>
                <span class="logo-text">飞牛直播</span>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索频道...">
            </div>
            
            <nav class="category-nav">
                <button class="category-btn active" data-category="all">全部频道</button>
                <button class="category-btn" data-category="favorite">我的收藏</button>
                <button class="category-btn" data-category="cctv">央视频道</button>
                <button class="category-btn" data-category="satellite">卫视频道</button>
                <button class="category-btn" data-category="local">地方频道</button>
                <button class="category-btn" data-category="other">其他频道</button>
            </nav>
            
            <div class="playlist-info">
                <p>频道数: <span id="channelCount">0</span></p>
                <button id="refreshBtn" class="refresh-btn">🔄 更新源</button>
                <button id="settingsBtn" class="settings-btn">⚙️ 设置</button>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 播放器区域 -->
            <div class="player-section">
                <div class="player-container">
                    <video id="videoPlayer" controls autoplay></video>
                    <div class="player-overlay" id="playerOverlay">
                        <div class="no-channel">
                            <span class="big-icon">📺</span>
                            <p>选择一个频道开始观看</p>
                        </div>
                    </div>
                    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                        <div class="spinner"></div>
                        <p>加载中...</p>
                    </div>
                </div>
                
                <div class="now-playing">
                    <div class="channel-info">
                        <span class="channel-logo" id="currentLogo"></span>
                        <div class="channel-details">
                            <h2 id="currentChannel">未选择频道</h2>
                            <p id="currentProgram">-</p>
                        </div>
                    </div>
                    <div class="player-controls">
                        <button id="prevChannel" title="上一个频道">⏮</button>
                        <button id="favoriteBtn" title="收藏">☆</button>
                        <button id="nextChannel" title="下一个频道">⏭</button>
                    </div>
                </div>
            </div>
            
            <!-- 频道列表 -->
            <div class="channel-section">
                <div class="channel-header">
                    <h3 id="categoryTitle">全部频道</h3>
                    <div class="view-options">
                        <button class="view-btn active" data-view="list">列表</button>
                        <button class="view-btn" data-view="grid">网格</button>
                    </div>
                </div>
                <div id="channelList" class="channel-list">
                    <!-- 频道列表将动态生成 -->
                </div>
            </div>
        </main>
    </div>
    
    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>设置</h3>
                <button class="close-btn" id="closeSettings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>直播源地址 (M3U/M3U8)</label>
                    <input type="text" id="playlistUrl" placeholder="请输入直播源URL">
                </div>
                <div class="form-group">
                    <label>或上传本地文件</label>
                    <input type="file" id="playlistFile" accept=".m3u,.m3u8">
                </div>
                <div class="form-group">
                    <label>EPG节目单地址 (可选)</label>
                    <input type="text" id="epgUrl" placeholder="请输入EPG XML地址">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="autoPlay"> 自动播放上次频道
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="resetSettings">重置</button>
                <button class="btn btn-primary" id="saveSettings">保存</button>
            </div>
        </div>
    </div>
    
    <!-- 加载提示 -->
    <div class="toast" id="toast"></div>
    
    <!-- 引入hls.js用于播放HLS流 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/app.js"></script>
</body>
</html>
